<svg width="240" height="80" viewBox="0 0 240 80" xmlns="http://www.w3.org/2000/svg">
    <!-- Sfondo orizzonte -->
    <defs>
        <linearGradient id="horizonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#4a6cf7;stop-opacity:0.8"/>
            <stop offset="100%" style="stop-color:#7b87ff;stop-opacity:0.9"/>
        </linearGradient>
    </defs>

    <!-- Elementi stack -->
    <rect x="20" y="45" width="60" height="15" rx="2" fill="#2d3748"/>
    <rect x="25" y="30" width="60" height="15" rx="2" fill="#4a5568"/>
    <rect x="30" y="15" width="60" height="15" rx="2" fill="#667eea"/>

    <!-- Linea orizzonte -->
    <path d="M10,55 C40,35 70,60 100,45 C130,30 160,50 190,40 C220,35 230,45 230,45"
          stroke="url(#horizonGradient)"
          stroke-width="3"
          fill="none"/>

    <!-- Testo -->
    <text x="105" y="35" font-family="'Merriweather Sans', sans-serif" font-weight="700" font-size="22" fill="#2d3748"
          text-anchor="middle">STACK
    </text>
    <text x="105" y="55" font-family="'Merriweather Sans', sans-serif" font-weight="300" font-size="18" fill="#4a6cf7"
          text-anchor="middle">HORIZON
    </text>
</svg>